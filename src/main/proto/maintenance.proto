syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.isums.maintenanceservice.grpc";
option java_outer_classname = "MaintenanceProto";

service MaintenanceService {
  rpc GetHouseByJobId(GetJobRequest) returns (GetJobResponse);
}

message GetJobRequest {
  string jobId = 1;
}

message GetJobResponse {
  string jobId = 1;
  string houseId = 2;
}