syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.isums.houseservice.grpc";
option java_outer_classname = "HouseProto";

import "google/protobuf/timestamp.proto";

service HouseService{
  rpc GetHouseById(GetHouseRequest) returns (HouseResponse);
  rpc GetRegionIdByHouseId (GetHouseRequest) returns (GetRegionResponse);
  rpc GetStaffByRegion (GetRegionRequest) returns (GetStaffByRegionResponse);
  // Returns houses where the user is the current RENTER (user_rental_id).
  // Semantically this is the TENANT-scoped list — not "houses owned by
  // a landlord" as the name suggests. Kept for backward-compat with
  // existing callers (asset-service, econtract-service); prefer
  // GetAllHouses for LANDLORD scope.
  rpc GetAllHouseByUser (GetHouseByUserRequest) returns (ListHouseResponse);
  rpc GetHousesByManagerRegion (GetHouseByUserRequest) returns (ListHouseResponse);
  // Single-landlord B2B model: the LANDLORD owns every house in the
  // system, so no per-user filter is needed. Callers must enforce
  // "caller has LANDLORD role" before invoking — this RPC does no
  // role check itself (gRPC channel is internal, trust boundary is
  // at the HTTP layer via @PreAuthorize).
  rpc GetAllHouses (GetAllHousesRequest) returns (ListHouseResponse);
}

message GetHouseRequest {
  string houseId = 1;
}

message GetHouseByUserRequest {
  string userId = 1;
}

message GetRegionRequest {
  string regionId = 1;
}

// Empty request — LANDLORD owns all houses by domain rule, no per-user
// filter. A message (even empty) is still required by proto3 so we can
// evolve the shape later without a breaking change (e.g. add a
// `statusFilter` field to skip MAINTENANCE houses).
message GetAllHousesRequest {
}

message ListHouseResponse {
  repeated HouseResponse house = 1;
}

message HouseResponse {
  string id = 1;
  string user_rental_id = 2;

  string name = 3;
  string address = 4;
  string ward = 5;
  string commune = 6;
  string city = 7;
  string description = 8;

  HouseStatus status = 9;

  repeated FunctionalAreaResponse functional_areas = 10;

  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;

  string region_id = 13;

  // Usable area in square meters, serialized as a decimal string ("45.5")
  // so the proto doesn't force a float rounding on the contract template.
  // Empty string ("") indicates not set.
  string area_m2 = 14;

  // Enum name from HouseStructure (LEVEL_4, TUBE_HOUSE, TOWN_HOUSE, VILLA, OTHER).
  // Empty string ("") indicates not set.
  string structure = 15;

  // Land use right certificate (GCN) — one per house, referenced by every lease
  // contract. "" indicates not set.
  string land_cert_number = 16;
  // ISO-8601 date string (e.g. "2020-05-15"), "" indicates not set.
  string land_cert_issue_date = 17;
  string land_cert_issuer = 18;
}

message FunctionalAreaResponse {
  string id = 1;

  string name = 2;
  AreaType area_type = 3;
  string floor_no = 4;
  string description = 5;

  FunctionalAreaStatus status = 6;

  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message GetRegionResponse {
  string regionId = 1;
  string managerId = 2;
}

message GetStaffByRegionResponse {
  repeated string staffIds = 1;
}

enum HouseStatus {
  HOUSE_STATUS_UNSPECIFIED = 0;
  HOUSE_STATUS_AVAILABLE = 1;
  HOUSE_STATUS_RENTED = 2;
  HOUSE_STATUS_REPAIRED = 3;
}

enum AreaType {
  AREA_TYPE_UNSPECIFIED = 0;
  AREA_TYPE_KITCHEN = 1;
  AREA_TYPE_HALLWAY = 2;
  AREA_TYPE_BEDROOM = 3;
  AREA_TYPE_BATHROOM = 4;
  AREA_TYPE_LIVINGROOM = 5;
  AREA_TYPE_GARDEN = 6;
  AREA_TYPE_ALL = 7;
  AREA_TYPE_OTHER = 8;
}

enum FunctionalAreaStatus {
  FUNCTIONAL_AREA_STATUS_UNSPECIFIED = 0;
  FUNCTIONAL_AREA_STATUS_REPAIRED = 1;
  FUNCTIONAL_AREA_STATUS_UNAVAILABLE = 2;
  FUNCTIONAL_AREA_STATUS_NORMAL = 3;
}
